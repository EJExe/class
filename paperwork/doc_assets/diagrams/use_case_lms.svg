  <ellipse class="usecase" cx="1145" cy="700" rx="120" ry="34"/>
  <text class="text" x="1145" y="707" text-anchor="middle">Создать курс</text>

  <ellipse class="usecase" cx="1145" cy="785" rx="130" ry="34"/>
