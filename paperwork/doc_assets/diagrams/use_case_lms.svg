  <line class="line" x1="200" y1="770" x2="502" y2="735"/>
  <line class="line" x1="200" y1="795" x2="560" y2="840"/>
  <line class="line" x1="200" y1="820" x2="548" y2="930"/>
  <line class="line" x1="200" y1="845" x2="520" y2="1030"/>
  <line class="line" x1="200" y1="870" x2="498" y2="1140"/>
  <line class="line" x1="200" y1="895" x2="530" y2="1245"/>
  <line class="line" x1="200" y1="920" x2="528" y2="1335"/>

  <line class="line" x1="200" y1="1035" x2="1025" y2="700"/>
  <line class="line" x1="200" y1="1055" x2="1015" y2="785"/>
  <line class="line" x1="200" y1="1075" x2="1017" y2="870"/>
  <line class="line" x1="200" y1="1095" x2="1007" y2="955"/>
  <line class="line" x1="200" y1="1115" x2="961" y2="1045"/>
  <line class="line" x1="200" y1="1135" x2="969" y2="1145"/>
  <line class="line" x1="200" y1="1155" x2="993" y2="1245"/>
  <line class="line" x1="200" y1="1175" x2="981" y2="1335"/>
  <line class="line" x1="200" y1="1195" x2="528" y2="1335"/>

  <line class="line" x1="290" y1="1235" x2="1303" y2="790"/>
  <line class="line" x1="290" y1="1255" x2="1289" y2="890"/>
  <line class="line" x1="290" y1="1275" x2="1271" y2="990"/>
  <line class="line" x1="290" y1="1295" x2="1303" y2="700"/>

  <!-- Include / Extend -->
  <line class="dash" x1="846" y1="1030" x2="548" y2="930" marker-end="url(#arrow)"/>
  <text class="small" x="690" y="975" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>

  <line class="dash" x1="864" y1="1140" x2="860" y2="862"/>
  <line class="dash" x1="860" y1="862" x2="838" y2="862" marker-end="url(#arrow)"/>
  <text class="small" x="890" y="930">&lt;&lt;extend&gt;&gt;</text>

  <line class="dash" x1="1297" y1="1245" x2="1320" y2="1198" marker-end="url(#arrow)"/>
