  <ellipse class="usecase" cx="1145" cy="1045" rx="184" ry="38"/>
  <text class="text" x="1145" y="1036" text-anchor="middle">Загрузить материалы</text>
  <text class="text" x="1145" y="1062" text-anchor="middle">задания</text>

  <ellipse class="usecase" cx="1145" cy="1145" rx="176" ry="38"/>
  <text class="text" x="1145" y="1136" text-anchor="middle">Просмотреть работы</text>
  <text class="text" x="1145" y="1162" text-anchor="middle">студентов</text>

  <ellipse class="usecase" cx="1145" cy="1245" rx="152" ry="38"/>
  <text class="text" x="1145" y="1236" text-anchor="middle">Проверить</text>
  <text class="text" x="1145" y="1262" text-anchor="middle">работу студента</text>

  <ellipse class="usecase" cx="1445" cy="1188" rx="126" ry="34"/>
  <text class="text" x="1445" y="1195" text-anchor="middle">Выставить оценку</text>

  <ellipse class="usecase" cx="1445" cy="1272" rx="156" ry="34"/>
  <text class="text" x="1445" y="1279" text-anchor="middle">Оставить комментарий</text>

  <ellipse class="usecase" cx="1145" cy="1335" rx="164" ry="38"/>
  <text class="text" x="1145" y="1326" text-anchor="middle">Просмотреть очередь</text>
  <text class="text" x="1145" y="1352" text-anchor="middle">проверки</text>

  <ellipse class="usecase" cx="1445" cy="700" rx="142" ry="34"/>
  <text class="text" x="1445" y="707" text-anchor="middle">Просмотреть ведомость</text>

  <!-- Admin -->
  <ellipse class="usecase" cx="1445" cy="790" rx="176" ry="38"/>
  <text class="text" x="1445" y="781" text-anchor="middle">Управлять ролями</text>
  <text class="text" x="1445" y="807" text-anchor="middle">пользователей</text>

  <ellipse class="usecase" cx="1445" cy="890" rx="156" ry="38"/>
  <text class="text" x="1445" y="881" text-anchor="middle">Просматривать</text>
  <text class="text" x="1445" y="907" text-anchor="middle">журнал аудита</text>

  <ellipse class="usecase" cx="1445" cy="990" rx="174" ry="38"/>
  <text class="text" x="1445" y="981" text-anchor="middle">Экспортировать</text>
  <text class="text" x="1445" y="1007" text-anchor="middle">данные курса</text>

  <!-- Associations -->
  <line class="line" x1="200" y1="180" x2="578" y2="170"/>
  <line class="line" x1="200" y1="198" x2="560" y2="250"/>

  <line class="line" x1="200" y1="450" x2="522" y2="360"/>
