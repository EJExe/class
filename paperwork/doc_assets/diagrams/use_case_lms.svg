<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1380" viewBox="0 0 1800 1380">
  <defs>
    <style>
      .sys { fill: #ffffff; stroke: #000000; stroke-width: 2.2; }
      .usecase { fill: #ffffff; stroke: #000000; stroke-width: 2; }
      .line { fill: none; stroke: #000000; stroke-width: 2; }
      .dash { fill: none; stroke: #000000; stroke-width: 2; stroke-dasharray: 8 6; }
      .title { font-family: Arial, "DejaVu Sans", sans-serif; font-size: 26px; font-weight: 700; }
      .text { font-family: Arial, "DejaVu Sans", sans-serif; font-size: 21px; }
      .small { font-family: Arial, "DejaVu Sans", sans-serif; font-size: 18px; }
      .actor { font-family: Arial, "DejaVu Sans", sans-serif; font-size: 22px; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#000000"/>
    </marker>
    <marker id="triangle" markerWidth="16" markerHeight="14" refX="14" refY="7" orient="auto">
      <path d="M0,7 L14,0 L14,14 z" fill="#ffffff" stroke="#000000" stroke-width="1.4"/>
    </marker>
  </defs>

  <rect class="sys" x="420" y="40" width="1320" height="1280"/>
  <line class="line" x1="420" y1="92" x2="1740" y2="92"/>
  <text class="title" x="1080" y="74" text-anchor="middle">Система организации учебного процесса</text>

  <!-- Actors -->
  <circle cx="150" cy="180" r="18" class="line"/>
  <line x1="150" y1="198" x2="150" y2="255" class="line"/>
  <line x1="120" y1="220" x2="180" y2="220" class="line"/>
  <line x1="150" y1="255" x2="125" y2="300" class="line"/>
  <line x1="150" y1="255" x2="175" y2="300" class="line"/>
  <text class="actor" x="150" y="338" text-anchor="middle">Гость</text>

  <circle cx="150" cy="455" r="18" class="line"/>
  <line x1="150" y1="473" x2="150" y2="530" class="line"/>
  <line x1="120" y1="495" x2="180" y2="495" class="line"/>
  <line x1="150" y1="530" x2="125" y2="575" class="line"/>
  <line x1="150" y1="530" x2="175" y2="575" class="line"/>
  <text class="actor" x="150" y="610" text-anchor="middle">Авторизованный</text>
  <text class="actor" x="150" y="638" text-anchor="middle">пользователь</text>

  <circle cx="150" cy="770" r="18" class="line"/>
  <line x1="150" y1="788" x2="150" y2="845" class="line"/>
  <line x1="120" y1="810" x2="180" y2="810" class="line"/>
  <line x1="150" y1="845" x2="125" y2="890" class="line"/>
  <line x1="150" y1="845" x2="175" y2="890" class="line"/>
  <text class="actor" x="150" y="925" text-anchor="middle">Студент</text>

  <circle cx="150" cy="1035" r="18" class="line"/>
  <line x1="150" y1="1053" x2="150" y2="1110" class="line"/>
  <line x1="120" y1="1075" x2="180" y2="1075" class="line"/>
  <line x1="150" y1="1110" x2="125" y2="1155" class="line"/>
  <line x1="150" y1="1110" x2="175" y2="1155" class="line"/>
  <text class="actor" x="150" y="1190" text-anchor="middle">Преподаватель</text>

  <circle cx="150" cy="1245" r="18" class="line"/>
  <line x1="150" y1="1263" x2="150" y2="1320" class="line"/>
  <line x1="120" y1="1285" x2="180" y2="1285" class="line"/>
  <line x1="150" y1="1320" x2="125" y2="1365" class="line"/>
  <line x1="150" y1="1320" x2="175" y2="1365" class="line"/>
  <text class="actor" x="150" y="1375" text-anchor="middle">Администратор</text>

  <!-- Actor generalization -->
  <line class="line" x1="230" y1="770" x2="230" y2="610"/>
  <line class="line" x1="230" y1="610" x2="205" y2="610" marker-end="url(#triangle)"/>

  <line class="line" x1="250" y1="1035" x2="250" y2="610"/>
  <line class="line" x1="250" y1="610" x2="205" y2="610" marker-end="url(#triangle)"/>

  <line class="line" x1="270" y1="1245" x2="270" y2="610"/>
  <line class="line" x1="270" y1="610" x2="205" y2="610" marker-end="url(#triangle)"/>

  <!-- Guest -->
  <ellipse class="usecase" cx="710" cy="170" rx="132" ry="34"/>
  <text class="text" x="710" y="177" text-anchor="middle">Авторизоваться</text>

  <ellipse class="usecase" cx="710" cy="250" rx="150" ry="34"/>
  <text class="text" x="710" y="257" text-anchor="middle">Зарегистрироваться</text>

  <!-- Authorized -->
  <ellipse class="usecase" cx="710" cy="360" rx="188" ry="38"/>
  <text class="text" x="710" y="367" text-anchor="middle">Просмотреть список курсов</text>

  <ellipse class="usecase" cx="710" cy="450" rx="132" ry="34"/>
  <text class="text" x="710" y="457" text-anchor="middle">Открыть профиль</text>

  <ellipse class="usecase" cx="710" cy="535" rx="158" ry="34"/>
  <text class="text" x="710" y="542" text-anchor="middle">Просмотреть уведомления</text>

  <ellipse class="usecase" cx="710" cy="620" rx="140" ry="34"/>
  <text class="text" x="710" y="627" text-anchor="middle">Выйти из аккаунта</text>

  <!-- Student -->
  <ellipse class="usecase" cx="710" cy="735" rx="208" ry="42"/>
  <text class="text" x="710" y="726" text-anchor="middle">Просмотреть доступные</text>
  <text class="text" x="710" y="752" text-anchor="middle">каналы курса</text>

  <ellipse class="usecase" cx="710" cy="840" rx="150" ry="34"/>
  <text class="text" x="710" y="847" text-anchor="middle">Просмотреть задание</text>

  <ellipse class="usecase" cx="710" cy="930" rx="162" ry="38"/>
  <text class="text" x="710" y="921" text-anchor="middle">Загрузить файл</text>
  <text class="text" x="710" y="947" text-anchor="middle">работы</text>

  <ellipse class="usecase" cx="710" cy="1030" rx="190" ry="42"/>
  <text class="text" x="710" y="1021" text-anchor="middle">Отправить работу</text>
  <text class="text" x="710" y="1047" text-anchor="middle">на проверку</text>

  <ellipse class="usecase" cx="710" cy="1140" rx="212" ry="42"/>
  <text class="text" x="710" y="1131" text-anchor="middle">Просмотреть комментарии</text>
  <text class="text" x="710" y="1157" text-anchor="middle">преподавателя</text>

  <ellipse class="usecase" cx="710" cy="1245" rx="180" ry="38"/>
  <text class="text" x="710" y="1236" text-anchor="middle">Просмотреть библиотеку</text>
  <text class="text" x="710" y="1262" text-anchor="middle">файлов</text>

  <ellipse class="usecase" cx="710" cy="1335" rx="182" ry="38"/>
  <text class="text" x="710" y="1326" text-anchor="middle">Подключиться</text>
  <text class="text" x="710" y="1352" text-anchor="middle">к видеокомнате</text>

